name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout psae-backtest
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Checkout all PSAE repos
        run: |
          git clone https://github.com/psae-project/psae-core.git     ../psae-core
          git clone https://github.com/psae-project/psae-signal.git   ../psae-signal
          git clone https://github.com/psae-project/psae-ingest.git   ../psae-ingest
          git clone https://github.com/psae-project/psae-factor.git   ../psae-factor
          git clone https://github.com/psae-project/psae-folio.git    ../psae-folio

      - name: Install CPU-only PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install all PSAE packages
        run: |
          pip install -e ../psae-core
          pip install -e ../psae-signal
          pip install -e ../psae-ingest
          pip install -e ../psae-factor
          pip install -e ../psae-folio
          pip install -e .

      - name: Install build tools & runtime deps
        run: |
          pip install pyinstaller uvicorn fastapi click pyaml
          python -m spacy download en_core_web_sm

      - name: Copy GUI script
        run: Copy-Item psae_gui.py launcher_gui.py
        shell: pwsh

      - name: Build CLI EXE (console)
        run: |
          pyinstaller launcher.py `
            --name psae-cli `
            --onedir --console `
            --collect-all spacy `
            --collect-all transformers `
            --collect-all psae `
            --collect-all psae_signal `
            --collect-all psae_backtest `
            --collect-all psae_ingest `
            --collect-all psae_factor `
            --collect-all psae_folio `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --exclude-module tkinter `
            --exclude-module matplotlib `
            --exclude-module notebook `
            --upx-dir . --clean
        shell: pwsh

      - name: Build GUI EXE (windowed)
        run: |
          pyinstaller launcher_gui.py `
            --name psae-gui `
            --onedir --windowed `
            --collect-all spacy `
            --collect-all transformers `
            --collect-all psae `
            --collect-all psae_signal `
            --collect-all psae_backtest `
            --collect-all psae_ingest `
            --collect-all psae_factor `
            --collect-all psae_folio `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --upx-dir . --clean
        shell: pwsh

      - name: Zip both builds
        run: |
          Compress-Archive -Path dist\psae-cli\* -DestinationPath psae-cli-windows-x64.zip
          Compress-Archive -Path dist\psae-gui\* -DestinationPath psae-gui-windows-x64.zip
        shell: pwsh

      - name: Upload as release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            psae-cli-windows-x64.zip
            psae-gui-windows-x64.zip

      - name: Upload as workflow artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: psae-windows-x64
          path: |
            psae-cli-windows-x64.zip
            psae-gui-windows-x64.zip
          retention-days: 14
